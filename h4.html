<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Multiplayer - Stable Version</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; font-family: 'Segoe UI', sans-serif; }
        
        #player-count {
            position: absolute; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.9);
            color: #333; padding: 12px 24px; border-radius: 30px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10;
            cursor: pointer; border: 2px solid #007bff; transition: all 0.3s;
        }

        #interaction-menu {
            display: none; position: fixed; background: white; padding: 10px;
            border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            z-index: 2000; min-width: 180px;
        }
        .menu-item {
            padding: 10px 15px; cursor: pointer; display: flex; align-items: center;
            gap: 10px; transition: background 0.2s; border-radius: 6px; font-size: 14px;
        }
        .menu-item:hover { background: #f0f7ff; color: #007bff; }
        .menu-item.disabled { color: #ccc; cursor: not-allowed; }
        .menu-header { font-weight: bold; padding: 5px 15px 10px; border-bottom: 1px solid #eee; margin-bottom: 5px; color: #666; }

        #nickname-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 3000; text-align: center;
        }
        #nickname-modal input {
            padding: 10px; width: 200px; border: 2px solid #ddd; border-radius: 8px;
            margin-bottom: 15px; font-size: 16px;
        }
        #nickname-modal button {
            padding: 10px 25px; background: #007bff; color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 5000;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid #007bff; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p>Загрузка мира...</p>
</div>

<div id="player-count" onclick="openNickModal()">Инициализация...</div>

<div id="interaction-menu">
    <div class="menu-header" id="target-name">Игрок</div>
    <div class="menu-item" onclick="alert('Чат скоро!')">💬 Написать сообщение</div>
    <div class="menu-item" onclick="alert('Файлы скоро!')">📁 Отправить файл</div>
    <div class="menu-item disabled">📞 Голосовой чат</div>
    <div class="menu-item disabled">🎥 Видео чат</div>
</div>

<div id="nickname-modal">
    <h3>Изменить никнейм</h3>
    <input type="text" id="nick-input" maxlength="12">
    <br>
    <button onclick="saveNickname()">Сохранить</button>
</div>

<!-- Использование esm.sh с параметром ?external=yjs решает критическую проблему дублирования импортов Yjs -->
<script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "yjs": "https://esm.sh/yjs@13.6.10",
            "y-webrtc": "https://esm.sh/y-webrtc@10.3.0?external=yjs"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import * as Y from 'yjs';
    import { WebrtcProvider } from 'y-webrtc';

    // --- Инициализация ---
    const roomName = window.location.hash ? 'room-' + window.location.hash.substring(1) : 'multiplayer-v7-stable-room';
    
    const ydoc = new Y.Doc();
    
    let provider = null;
    try {
        provider = new WebrtcProvider(roomName, ydoc, {
            // Оставляем только гарантированно работающий сигнальный сервер (Heroku отключил бесплатные серверы)
            signaling: [
                'wss://signaling.yjs.dev'
            ],
            // STUN сервера Google обязательны для подключения браузеров из разных сетей (пробивка NAT)
            peerOpts: {
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: 'stun:stun3.l.google.com:19302' },
                        { urls: 'stun:stun4.l.google.com:19302' }
                    ]
                }
            }
        });
    } catch (e) {
        console.error("Ошибка инициализации WebRTC:", e);
    }

    const awareness = provider ? provider.awareness : { 
        clientID: Math.floor(Math.random() * 1000000),
        setLocalState: () => {}, 
        getStates: () => new Map(), 
        on: () => {} 
    };

    let myNickname = "Игрок_" + awareness.clientID.toString().slice(-3);

    let scene, camera, renderer, clock, controls, raycaster, mouse;
    let localModel, localMixer;
    let remotePlayers = new Map();
    const localActions = { idle: null, walk: null, run: null };
    const keys = { w: false, a: false, s: false, d: false, shift: false };
    const MODEL_URL = 'https://threejs.org/examples/models/gltf/Xbot.glb';

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe0e0e0);
        scene.fog = new THREE.Fog(0xe0e0e0, 10, 50);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();
        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(5, 10, 5);
        sun.castShadow = true;
        scene.add(sun);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new MeshPhongMaterial({ color: 0x999999 }));
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
        scene.add(new THREE.GridHelper(100, 40));

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        new GLTFLoader().load(MODEL_URL, (gltf) => {
            localModel = gltf.scene;
            scene.add(localModel);
            localModel.traverse(c => { if(c.isMesh) c.castShadow = true; });
            
            const label = createTextLabel(myNickname, '#007bff');
            label.name = 'label';
            localModel.add(label);

            localMixer = new THREE.AnimationMixer(localModel);
            gltf.animations.forEach(clip => {
                const name = clip.name.toLowerCase();
                if (name.includes('idle')) localActions.idle = localMixer.clipAction(clip).play();
                if (name.includes('walk')) localActions.walk = localMixer.clipAction(clip).play();
                if (name.includes('run')) localActions.run = localMixer.clipAction(clip).play();
            });

            document.getElementById('loading-overlay').style.display = 'none';
            animate();
        });

        awareness.on('change', () => {
            const states = awareness.getStates();
            document.getElementById('player-count').innerText = `Игроков: ${states.size} (Вы: ${myNickname})`;
            
            states.forEach((state, id) => {
                if (id === awareness.clientID || !state.pos) return;
                if (!remotePlayers.has(id)) {
                    loadRemote(id, state.nick);
                } else {
                    const p = remotePlayers.get(id);
                    p.targetPos.set(state.pos.x, state.pos.y, state.pos.z);
                    p.targetRot.set(state.rot.x, state.rot.y, state.rot.z, state.rot.w);
                    p.targetAnim = state.anim;
                }
            });

            // Удаление вышедших игроков
            remotePlayers.forEach((p, id) => {
                if (!states.has(id)) {
                    scene.remove(p.model);
                    remotePlayers.delete(id);
                }
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; if(e.key === 'Shift') keys.shift = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; if(e.key === 'Shift') keys.shift = false; });
        window.addEventListener('mousedown', onSelect);
    }

    function createTextLabel(text, color) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 100;
        ctx.font = 'bold 40px Arial';
        ctx.fillStyle = color;
        ctx.textAlign = 'center';
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 4;
        ctx.strokeText(text, 200, 50);
        ctx.fillText(text, 200, 50);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
        sprite.scale.set(3, 0.75, 1);
        sprite.position.y = 2.5;
        return sprite;
    }

    function loadRemote(id, nick) {
        new GLTFLoader().load(MODEL_URL, (gltf) => {
            const model = gltf.scene;
            model.userData.playerId = id;
            scene.add(model);
            model.add(createTextLabel(nick || "Игрок", "#444"));
            const mixer = new THREE.AnimationMixer(model);
            const acts = {};
            gltf.animations.forEach(c => {
                const n = c.name.toLowerCase();
                if(n.includes('idle') || n.includes('walk') || n.includes('run')) acts[n.includes('idle')?'idle':n.includes('run')?'run':'walk'] = mixer.clipAction(c).play();
            });
            remotePlayers.set(id, { model, mixer, acts, targetPos: new THREE.Vector3(), targetRot: new THREE.Quaternion(), targetAnim: 'idle' });
        });
    }

    function onSelect(e) {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(Array.from(remotePlayers.values()).map(p => p.model), true);
        if (intersects.length > 0) {
            let obj = intersects[0].object;
            while (obj.parent && !obj.userData.playerId) obj = obj.parent;
            if (obj.userData.playerId) {
                const menu = document.getElementById('interaction-menu');
                menu.style.display = 'block';
                menu.style.left = e.clientX + 'px';
                menu.style.top = e.clientY + 'px';
                document.getElementById('target-name').innerText = "Игрок #" + obj.userData.playerId.toString().slice(-4);
            }
        } else {
            document.getElementById('interaction-menu').style.display = 'none';
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        
        if (localModel) {
            const moving = keys.w || keys.s || keys.a || keys.d;
            const anim = moving ? (keys.shift ? 'run' : 'walk') : 'idle';
            
            if (moving) {
                if(keys.w) localModel.translateZ(delta * (keys.shift ? 6 : 3));
                if(keys.s) localModel.translateZ(-delta * 3);
                if(keys.a) localModel.rotation.y += delta * 3;
                if(keys.d) localModel.rotation.y -= delta * 3;
            }

            localMixer.update(delta);
            ['idle', 'walk', 'run'].forEach(n => {
                if(localActions[n]) {
                    localActions[n].weight = THREE.MathUtils.lerp(localActions[n].weight, n === anim ? 1 : 0, 0.1);
                }
            });

            awareness.setLocalState({
                pos: localModel.position,
                rot: localModel.quaternion,
                anim: anim,
                nick: myNickname
            });

            controls.target.copy(localModel.position).add(new THREE.Vector3(0, 1.5, 0));
        }

        remotePlayers.forEach(p => {
            p.model.position.lerp(p.targetPos, 0.1);
            p.model.quaternion.slerp(p.targetRot, 0.1);
            p.mixer.update(delta);
            Object.keys(p.acts).forEach(n => {
                p.acts[n].weight = THREE.MathUtils.lerp(p.acts[n].weight, n === p.targetAnim ? 1 : 0, 0.1);
            });
        });

        controls.update();
        renderer.render(scene, camera);
    }

    window.saveNickname = () => {
        const val = document.getElementById('nick-input').value.trim();
        if (val) {
            myNickname = val;
            const label = localModel.getObjectByName('label');
            if (label) localModel.remove(label);
            const newLabel = createTextLabel(myNickname, '#007bff');
            newLabel.name = 'label';
            localModel.add(newLabel);
        }
        document.getElementById('nickname-modal').style.display = 'none';
    };

    window.openNickModal = () => {
        document.getElementById('nick-input').value = myNickname;
        document.getElementById('nickname-modal').style.display = 'block';
    };

    // Исправление для MeshPhongMaterial, который используется в init()
    const MeshPhongMaterial = THREE.MeshPhongMaterial;

    init();
</script>
</body>
</html>
